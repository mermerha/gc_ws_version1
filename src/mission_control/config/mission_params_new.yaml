mission_control:
  fly_height: 1.2
  tolerance: 0.3

  # 总航点数
  num_points: 5

  # A区是第几个点 (在此点读取颜色)
  a_point_index: 2

  # B区是第几个点 (到达后根据颜色飞向对应终点)
  b_point_index: 5

  # ---- 航点坐标 (按需增减) ----
  point1_x: 3.2
  point1_y: 0.0

  point2_x: 3.4
  point2_y: 3.2

  point3_x: 3.0
  point3_y: 3.2

  point4_x: 2.4
  point4_y: 3.2

  point5_x: 1.5
  point5_y: 2.0

  # ---- 三种颜色的终点坐标 ----
  color_end_r_x: 2.0
  color_end_r_y: 3.0

  color_end_g_x: 2.0
  color_end_g_y: 3.5

  color_end_b_x: 2.0
  color_end_b_y: 4.0

mission_control:
  fly_height: 1.2
  fly_height_color: 0.8
  tolerance: 0.3
  color_detect_attempts: 3

  # ---- Navigation Waypoints ----
  # point1: intermediate waypoint toward A area
  point1_x: 3.2
  point1_y: 0.0

  # point2: A point (color recognition & grab area)
  point2_x: 3.4
  point2_y: 3.2

  # point3: intermediate waypoint toward B area
  point3_x: 3.0
  point3_y: 3.2

  # point4: B area approach point
  point4_x: 2.4
  point4_y: 3.2

  # ---- B Area R/G/B Landing Pad Coordinates ----
  # Adjust these to match actual field layout
  land_point_r_x: 2.0
  land_point_r_y: 3.0

  land_point_g_x: 2.0
  land_point_g_y: 3.5

  land_point_b_x: 2.0
  land_point_b_y: 4.0
